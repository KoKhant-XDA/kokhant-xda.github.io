<!DOCTYPE html>
<html>
<head>
  <title>PiUnlocker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      font-family: monospace;
      color: #00ffcc;
      overflow: hidden;
    }

    #loader {
      padding: 20px;
      white-space: pre-line;
      font-size: 14px;
    }

    .line {
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .green { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
    .blue { color: #00ccff; text-shadow: 0 0 5px #00ccff; }
    .orange { color: #ff9900; text-shadow: 0 0 5px #ff9900; }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: none;
    }
  </style>
</head>

<body>

<div id="loader"></div>

<iframe id="siteFrame" src="https://about.piunlocker.com/"></iframe>

<script>
  const lines = [
    { text: "[BOOT] Initializing PiUnlocker Core...", class: "blue" },
    { text: "[OK] Loading modules...", class: "green" },
    { text: "[OK] Connecting secure server...", class: "green" },
    { text: "[SCAN] Detecting environment...", class: "orange" },
    { text: "[OK] Bypassing restrictions...", class: "green" },
    { text: "[OK] Injecting modules...", class: "green" },
    { text: "[WAIT] Establishing connection...", class: "orange" },
    { text: "[SUCCESS] System Ready ✔", class: "blue" }
  ];

  const loader = document.getElementById("loader");

  let i = 0;

  function typeLine() {
    if (i < lines.length) {
      const div = document.createElement("div");
      div.className = "line " + lines[i].class;
      loader.appendChild(div);

      let text = lines[i].text;
      let j = 0;

      function typeChar() {
        if (j < text.length) {
          div.innerHTML += text.charAt(j);
          j++;
          setTimeout(typeChar, 20);
        }
      }

      typeChar();
      i++;
      setTimeout(typeLine, 600);
    }
  }

  typeLine();

  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("siteFrame").style.display = "block";
  }, 5000);
</script>

</body>
</html>
