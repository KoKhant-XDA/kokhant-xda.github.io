<!DOCTYPE html>
<html>
<head>
  <title>PiUnlocker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #050816;
      font-family: monospace;
      color: #00ccff;
      overflow: hidden;
    }

    /* Loader container */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Neon pulse circle */
    .spinner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 4px solid #1b2a4a;
      border-top: 4px solid #ff9900;
      border-right: 4px solid #ff9900;
      animation: spin 1s linear infinite, glow 1.5s ease-in-out infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes glow {
      0% { box-shadow: 0 0 5px #ff9900; }
      50% { box-shadow: 0 0 20px #ff9900; }
      100% { box-shadow: 0 0 5px #ff9900; }
    }

    /* Text */
    .text {
      margin-top: 20px;
      font-size: 14px;
      color: #00ccff;
      text-shadow: 0 0 6px #00ccff;
      animation: fade 1s infinite alternate;
    }

    @keyframes fade {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: none;
    }
  </style>
</head>

<body>

<div id="loader">
  <div class="spinner"></div>
  <div class="text">Initializing PiUnlocker...</div>
</div>

<iframe id="siteFrame" src="https://about.piunlocker.com/"></iframe>

<script>
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("siteFrame").style.display = "block";
  }, 3000);
</script>

</body>
</html>
